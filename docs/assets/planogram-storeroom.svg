<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="-apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" role="img" aria-labelledby="storeroom-title storeroom-desc">
  <title id="storeroom-title">RLC Café — Storeroom planogram</title>
  <desc id="storeroom-desc">Front-on view of storeroom shelving with five shelves: coffee on top, powders, Monin syrups, teas and jars, and bulk reserves on the bottom.</desc>

  <defs>
    <linearGradient id="rackBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5DCC8"/>
      <stop offset="1" stop-color="#C8B89A"/>
    </linearGradient>
    <linearGradient id="shelfWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E8D0"/>
      <stop offset="1" stop-color="#DCC9A4"/>
    </linearGradient>
  </defs>

  <style>
    .label-zone   { font-size:13px; font-weight:700; fill:#5A4632; letter-spacing:.5px; }
    .label-item   { font-size:11px; font-weight:600; fill:#2E2419; }
    .label-sub    { font-size:9.5px; fill:#5A4632; }
    .label-tag    { font-size:9px; font-weight:700; fill:#3D2B1F; }
    .legend       { font-size:11px; fill:#3D2B1F; }
  </style>

  <text x="400" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#3D2B1F">STOREROOM — Planogram (front view)</text>
  <text x="400" y="44" text-anchor="middle" font-size="11" fill="#7A6355">Open container in front, sealed reserves behind. Bold top labels on every powder tub.</text>

  <!-- Storage rack outer frame -->
  <rect x="40" y="56" width="720" height="528" rx="8" fill="url(#rackBody)" stroke="#8C7A5A" stroke-width="2"/>
  <!-- Vertical posts -->
  <rect x="46"  y="62" width="6" height="516" fill="#8C7A5A"/>
  <rect x="748" y="62" width="6" height="516" fill="#8C7A5A"/>

  <!-- ============================================================ -->
  <!-- SHELF 1 — COFFEE                                              -->
  <!-- ============================================================ -->
  <rect x="56" y="72" width="688" height="92" rx="4" fill="url(#shelfWood)" stroke="#A78F66" stroke-width="1"/>
  <text x="68" y="88" class="label-zone">SHELF 1 — COFFEE</text>

  <!-- REGULAR cluster -->
  <rect x="80" y="100" width="270" height="56" rx="4" fill="#F0E1CB" stroke="#7A4A1F" stroke-width="2"/>
  <rect x="80" y="100" width="270" height="16" fill="#7A4A1F"/>
  <text x="215" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="2">REGULAR</text>
  <rect x="92"  y="124" width="48" height="28" rx="3" fill="#C2986F" stroke="#7A4A1F" stroke-width="2"/>
  <text x="116" y="142" text-anchor="middle" class="label-tag">OPEN</text>
  <rect x="148" y="124" width="48" height="28" rx="3" fill="#A87547" stroke="#7A4A1F"/>
  <text x="172" y="142" text-anchor="middle" class="label-tag">SEALED</text>
  <rect x="204" y="124" width="48" height="28" rx="3" fill="#A87547" stroke="#7A4A1F"/>
  <text x="228" y="142" text-anchor="middle" class="label-tag">SEALED</text>
  <rect x="260" y="124" width="48" height="28" rx="3" fill="#A87547" stroke="#7A4A1F"/>
  <text x="284" y="142" text-anchor="middle" class="label-tag">SEALED</text>

  <!-- Gap (physical separation) -->
  <text x="395" y="135" text-anchor="middle" font-size="10" fill="#9A6432" font-style="italic">— 30 cm gap —</text>

  <!-- DECAF cluster -->
  <rect x="450" y="100" width="270" height="56" rx="4" fill="#F0E1CB" stroke="#5A3214" stroke-width="2"/>
  <rect x="450" y="100" width="270" height="16" fill="#5A3214"/>
  <text x="585" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="2">DECAF</text>
  <rect x="462" y="124" width="48" height="28" rx="3" fill="#A07A55" stroke="#5A3214" stroke-width="2"/>
  <text x="486" y="142" text-anchor="middle" class="label-tag">OPEN</text>
  <rect x="518" y="124" width="48" height="28" rx="3" fill="#85603F" stroke="#5A3214"/>
  <text x="542" y="142" text-anchor="middle" class="label-tag">SEALED</text>
  <rect x="574" y="124" width="48" height="28" rx="3" fill="#85603F" stroke="#5A3214"/>
  <text x="598" y="142" text-anchor="middle" class="label-tag">SEALED</text>

  <!-- ============================================================ -->
  <!-- SHELF 2 — POWDERS (lookalikes)                                -->
  <!-- ============================================================ -->
  <rect x="56" y="172" width="688" height="100" rx="4" fill="url(#shelfWood)" stroke="#A78F66" stroke-width="1"/>
  <text x="68" y="188" class="label-zone">SHELF 2 — POWDERS (fixed left-to-right order, top labels visible)</text>

  <!-- Tiger 63 -->
  <rect x="76" y="200" width="150" height="60" rx="6" fill="#9B6F4A" stroke="#5A3214" stroke-width="2"/>
  <rect x="76" y="200" width="150" height="14" fill="#3D2B1F"/>
  <text x="151" y="211" text-anchor="middle" font-size="10" font-weight="700" fill="#FFE6A8" letter-spacing="1">TIGER 63 %</text>
  <text x="151" y="234" text-anchor="middle" class="label-item" fill="#fff">Chocolate</text>
  <text x="151" y="250" text-anchor="middle" class="label-sub" fill="#FBE7B3">open + sealed reserves</text>

  <!-- Unicorn 50 -->
  <rect x="236" y="200" width="150" height="60" rx="6" fill="#7C5234" stroke="#3F2410" stroke-width="2"/>
  <rect x="236" y="200" width="150" height="14" fill="#2A180A"/>
  <text x="311" y="211" text-anchor="middle" font-size="10" font-weight="700" fill="#FFE6A8" letter-spacing="1">UNICORN 50 %</text>
  <text x="311" y="234" text-anchor="middle" class="label-item" fill="#fff">Chocolate</text>
  <text x="311" y="250" text-anchor="middle" class="label-sub" fill="#FBE7B3">open + sealed</text>

  <!-- Matcha -->
  <rect x="396" y="200" width="150" height="60" rx="6" fill="#7BA87A" stroke="#3F6B3E" stroke-width="2"/>
  <rect x="396" y="200" width="150" height="14" fill="#3F6B3E"/>
  <text x="471" y="211" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" letter-spacing="2">MATCHA</text>
  <text x="471" y="234" text-anchor="middle" class="label-item" fill="#fff">Powder</text>
  <text x="471" y="250" text-anchor="middle" class="label-sub" fill="#E0EFD8">open + sealed</text>

  <!-- Chai -->
  <rect x="556" y="200" width="150" height="60" rx="6" fill="#D9B580" stroke="#8C6A30" stroke-width="2"/>
  <rect x="556" y="200" width="150" height="14" fill="#8C6A30"/>
  <text x="631" y="211" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" letter-spacing="2">CHAI</text>
  <text x="631" y="234" text-anchor="middle" class="label-item">Latte Powder</text>
  <text x="631" y="250" text-anchor="middle" class="label-sub">open + sealed</text>

  <!-- ============================================================ -->
  <!-- SHELF 3 — MONIN SYRUPS                                        -->
  <!-- ============================================================ -->
  <rect x="56" y="280" width="688" height="100" rx="4" fill="url(#shelfWood)" stroke="#A78F66" stroke-width="1"/>
  <text x="68" y="296" class="label-zone">SHELF 3 — MONIN SYRUPS (LABELS FORWARD — non-negotiable)</text>

  <!-- Each syrup as a bottle silhouette: cap + body + neck label -->
  <g>
    <!-- Passion Fruit -->
    <rect x="84" y="312" width="106" height="60" rx="4" fill="#FBD8B0" stroke="#C56A2A" stroke-width="2"/>
    <rect x="84" y="312" width="106" height="14" fill="#C56A2A"/>
    <text x="137" y="323" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">PASSION FRUIT</text>
    <text x="137" y="346" text-anchor="middle" class="label-item">Monin</text>
    <text x="137" y="362" text-anchor="middle" class="label-sub">open w/ pump + sealed</text>
  </g>
  <g>
    <!-- Lemon -->
    <rect x="200" y="312" width="106" height="60" rx="4" fill="#FAEFA4" stroke="#9F8C24" stroke-width="2"/>
    <rect x="200" y="312" width="106" height="14" fill="#9F8C24"/>
    <text x="253" y="323" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">LEMON</text>
    <text x="253" y="346" text-anchor="middle" class="label-item">Monin</text>
    <text x="253" y="362" text-anchor="middle" class="label-sub">open w/ pump + sealed</text>
  </g>
  <g>
    <!-- Orange Fruitmix -->
    <rect x="316" y="312" width="106" height="60" rx="4" fill="#F8C281" stroke="#B86420" stroke-width="2"/>
    <rect x="316" y="312" width="106" height="14" fill="#B86420"/>
    <text x="369" y="323" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">ORANGE</text>
    <text x="369" y="346" text-anchor="middle" class="label-item">Monin Fruitmix</text>
    <text x="369" y="362" text-anchor="middle" class="label-sub">open w/ pump + sealed</text>
  </g>
  <g>
    <!-- Butterfly Pea -->
    <rect x="432" y="312" width="106" height="60" rx="4" fill="#C7B5DE" stroke="#5C3F88" stroke-width="2"/>
    <rect x="432" y="312" width="106" height="14" fill="#5C3F88"/>
    <text x="485" y="323" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">BUTTERFLY PEA</text>
    <text x="485" y="346" text-anchor="middle" class="label-item">Tea concentrate</text>
    <text x="485" y="362" text-anchor="middle" class="label-sub">open w/ pump + sealed</text>
  </g>
  <g>
    <!-- Sugar Syrup -->
    <rect x="548" y="312" width="106" height="60" rx="4" fill="#F5EFDF" stroke="#7A6355" stroke-width="2"/>
    <rect x="548" y="312" width="106" height="14" fill="#7A6355"/>
    <text x="601" y="323" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">SUGAR</text>
    <text x="601" y="346" text-anchor="middle" class="label-item">Sugar Syrup</text>
    <text x="601" y="362" text-anchor="middle" class="label-sub">open + sealed</text>
  </g>
  <g>
    <!-- Spare slot -->
    <rect x="664" y="312" width="62" height="60" rx="4" fill="#F4F4F4" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="695" y="346" text-anchor="middle" class="label-sub">spare slot</text>
    <text x="695" y="360" text-anchor="middle" class="label-sub">(future)</text>
  </g>

  <!-- ============================================================ -->
  <!-- SHELF 4 — TEAS / JARS / SMALL                                 -->
  <!-- ============================================================ -->
  <rect x="56" y="388" width="688" height="92" rx="4" fill="url(#shelfWood)" stroke="#A78F66" stroke-width="1"/>
  <text x="68" y="404" class="label-zone">SHELF 4 — TEAS · JARS · SMALL BOTTLES</text>

  <rect x="80" y="416" width="160" height="56" rx="4" fill="#E2EFD9" stroke="#5C8B3D" stroke-width="2"/>
  <text x="160" y="436" text-anchor="middle" class="label-item">English Breakfast</text>
  <text x="160" y="452" text-anchor="middle" class="label-sub">box open · sachets visible</text>
  <text x="160" y="466" text-anchor="middle" class="label-sub">count individual bags</text>

  <rect x="252" y="416" width="160" height="56" rx="4" fill="#FBE7B3" stroke="#C8923A" stroke-width="2"/>
  <text x="332" y="436" text-anchor="middle" class="label-item">Citron Paste</text>
  <text x="332" y="452" text-anchor="middle" class="label-sub">sealed jar (open is in fridge)</text>

  <rect x="424" y="416" width="160" height="56" rx="4" fill="#D4D4F0" stroke="#5C5C9A" stroke-width="2"/>
  <text x="504" y="436" text-anchor="middle" class="label-item">Ribena</text>
  <text x="504" y="452" text-anchor="middle" class="label-sub">sealed (open is in fridge)</text>

  <rect x="596" y="416" width="130" height="56" rx="4" fill="#F4F4F4" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="661" y="436" text-anchor="middle" class="label-item">Spare tea boxes</text>
  <text x="661" y="452" text-anchor="middle" class="label-sub">if any</text>

  <!-- ============================================================ -->
  <!-- SHELF 5 — BULK RESERVES                                       -->
  <!-- ============================================================ -->
  <rect x="56" y="488" width="688" height="92" rx="4" fill="url(#shelfWood)" stroke="#A78F66" stroke-width="1"/>
  <text x="68" y="504" class="label-zone">SHELF 5 / FLOOR — BULK RESERVES (one row deep)</text>

  <rect x="80" y="516" width="200" height="56" rx="4" fill="#E0F1D9" stroke="#5C8B3D" stroke-width="2"/>
  <text x="180" y="538" text-anchor="middle" class="label-item">Sprite — case</text>
  <text x="180" y="554" text-anchor="middle" class="label-sub">stacked one row deep</text>

  <rect x="292" y="516" width="200" height="56" rx="4" fill="#E0EDF5" stroke="#3F7CA8" stroke-width="2"/>
  <text x="392" y="538" text-anchor="middle" class="label-item">Sparkling Water — case</text>
  <text x="392" y="554" text-anchor="middle" class="label-sub">stacked one row deep</text>

  <rect x="504" y="516" width="160" height="56" rx="4" fill="#FBE7B3" stroke="#C8923A" stroke-width="2"/>
  <text x="584" y="538" text-anchor="middle" class="label-item">Nata de Coco</text>
  <text x="584" y="554" text-anchor="middle" class="label-sub">sealed jars only</text>

  <rect x="676" y="516" width="50" height="56" rx="4" fill="#F5F0D6" stroke="#A8902A" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="701" y="544" text-anchor="middle" class="label-sub">Tonic</text>
  <text x="701" y="558" text-anchor="middle" class="label-sub">case</text>

  <!-- Legend -->
  <g transform="translate(56, 600)">
    <rect x="0"   y="-7" width="14" height="10" fill="#9B6F4A" stroke="#5A3214"/>
    <text x="20"  y="2" class="legend">Coffee / Chocolate</text>
    <rect x="140" y="-7" width="14" height="10" fill="#7BA87A" stroke="#3F6B3E"/>
    <text x="160" y="2" class="legend">Matcha</text>
    <rect x="225" y="-7" width="14" height="10" fill="#FBD8B0" stroke="#C56A2A"/>
    <text x="245" y="2" class="legend">Monin syrups</text>
    <rect x="335" y="-7" width="14" height="10" fill="#C7B5DE" stroke="#5C3F88"/>
    <text x="355" y="2" class="legend">Butterfly Pea</text>
    <rect x="445" y="-7" width="14" height="10" fill="#E2EFD9" stroke="#5C8B3D"/>
    <text x="465" y="2" class="legend">Tea</text>
    <text x="510" y="2" class="legend" font-style="italic">Bold top labels — AI reads words, not colour</text>
  </g>
</svg>
