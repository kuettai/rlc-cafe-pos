<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2563EB">
<title>RLC Café</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>☕ RLC Café</h1></header>
<div class="error-banner" id="errorBanner" role="alert"></div>
<div class="container" id="app"><div class="loading">Loading...</div></div>

<div class="cart-bar hidden" id="cartBar" role="button" aria-label="View cart" tabindex="0">
  <span class="cart-count" id="cartCount">0 items</span>
  <span class="cart-total" id="cartTotal">RM 0.00</span>
</div>

<div class="cart-overlay" id="cartOverlay" aria-modal="true" role="dialog" aria-label="Shopping cart">
  <div class="cart-panel" id="cartPanel">
    <h2>Your Order</h2>
    <div id="cartItems"></div>
    <div class="order-total" id="cartTotalExpanded">Total: RM 0.00</div>
    <button class="cart-submit" id="cartSubmit">Place Order</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
