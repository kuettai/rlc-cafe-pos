<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2563EB">
<title>RLC Café</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>☕ RLC Café</h1><p style="font-size:.85rem;opacity:.85;margin-top:4px;font-weight:400">Oasis of Care, Petaling Jaya</p></header>
<div class="error-banner" id="errorBanner" role="alert"></div>
<div class="container" id="app"><div class="loading">Loading...</div></div>

<div class="cart-bar hidden" id="cartBar" role="button" aria-label="View cart" aria-live="polite" aria-atomic="true" tabindex="0">
  <span class="cart-count" id="cartCount">0 items</span>
  <span class="cart-cta">View Order →</span>
  <span class="cart-total" id="cartTotal">RM 0.00</span>
</div>

<div class="cart-overlay" id="cartOverlay" aria-modal="true" role="dialog" aria-label="Shopping cart">
  <div class="cart-panel" id="cartPanel">
    <div style="display:flex;justify-content:space-between;align-items:center"><h2>Your Order</h2><button id="cartClose" style="background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px 8px;color:var(--text-light,#7A6355)">✕</button></div>
    <div id="cartItems"></div>
    <div class="order-total" id="cartTotalExpanded">Total: RM 0.00</div>
    <button class="cart-submit" id="cartSubmit">Place Order</button>
  </div>
</div>

<div class="install-banner hidden" id="installBanner">
  <span>📱 Add to Home Screen for quick access</span>
  <button id="installBtn" class="pos-btn pos-btn-sm pos-btn-primary">Install</button>
  <button id="installDismiss" class="pos-btn pos-btn-sm" style="padding:6px 10px">✕</button>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.remove('hidden');
});
document.getElementById('installBtn').onclick = async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.add('hidden');
};
document.getElementById('installDismiss').onclick = ()=>{
  document.getElementById('installBanner').classList.add('hidden');
};
</script>
</body>
</html>
