<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#4A2C17">
<title>Admin - RLC Café</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<header class="pos-header" style="background:linear-gradient(135deg,#4A2C17 0%,#6B4226 50%,#8B5E3C 100%)">
  <button class="header-hamburger" id="adminHeaderToggle" aria-label="Toggle menu">☰</button>
  <h1>☕ RLC Café Admin</h1>
  <a href="reports.html" class="header-logout" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px">📊 Reports</a>
</header>
<div class="error-banner" id="errorBanner" role="alert"></div>
<div class="admin-app" id="app"></div>

<footer class="app-footer" id="appFooter">
  <span class="app-version">v1.54.0</span>
  <button id="checkUpdateBtn" class="check-update-btn">Check for update</button>
</footer>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>
<script src="js/admin-dashboard.js"></script>
<script src="js/admin-menu.js"></script>
<script src="js/admin-ingredients.js"></script>
<script src="js/admin-checklist.js"></script>
<script src="js/admin-vouchers.js"></script>
<script src="js/admin-preorder.js"></script>
<script src="js/changelog.js"></script>
<script>token ? renderApp() : renderLogin();</script>
<script>
let swRegistration = null;
if('serviceWorker' in navigator){
  // Snapshot BEFORE registration — see index.html for rationale.
  const hadPreviousController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.register('sw.js').then(reg=>{
    swRegistration = reg;
    reg.addEventListener('updatefound',()=>{
      const newWorker=reg.installing;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='activated' && hadPreviousController){
          const banner=document.createElement('div');
          banner.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#6B4226;color:#fff;padding:12px 20px;border-radius:12px;z-index:999;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;gap:10px;align-items:center';
          banner.innerHTML='<span>New version available</span><button onclick="location.reload()" style="background:#fff;color:#6B4226;border:none;padding:6px 12px;border-radius:8px;font-weight:700;cursor:pointer">Refresh</button>';
          document.body.appendChild(banner);
        }
      });
    });
  });
}
document.getElementById('checkUpdateBtn').addEventListener('click',async function(){
  const btn=this;
  btn.textContent='Checking...';
  btn.disabled=true;
  try{
    if(swRegistration){
      await swRegistration.update();
      const waiting=swRegistration.waiting;
      if(waiting){
        location.reload();
      } else {
        btn.textContent='You\'re up to date ✓';
        setTimeout(()=>{btn.textContent='Check for update';btn.disabled=false},3000);
      }
    } else {
      btn.textContent='No service worker';
      setTimeout(()=>{btn.textContent='Check for update';btn.disabled=false},2000);
    }
  }catch(e){
    btn.textContent='Check failed';
    setTimeout(()=>{btn.textContent='Check for update';btn.disabled=false},2000);
  }
});
</script>
</body>
</html>
